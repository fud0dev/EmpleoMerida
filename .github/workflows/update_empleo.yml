name: Update Merida Empleo Data

on:
  schedule:
    - cron: '0 7,15 * * *' # 9:00 y 17:00 hora España (verano)
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          
      - name: Run SEXPE Scraper
        run: python fetch_sexpe.py
        
      - name: Run SNE Scraper
        run: python fetch_sne.py
        
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Accion: Ofertas de empleo actualizadas en portal"
          file_pattern: "docs/data/*.json"
          commit_author: "GitHub Actions Bot <actions@github.com>"
